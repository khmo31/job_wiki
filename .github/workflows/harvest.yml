name: 주간 채용공고 수집

on:
  schedule:
    # 매주 월요일 09:00 KST (일요일 24:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mock:
        description: '모의 데이터 사용'
        type: boolean
        default: false
      days:
        description: '수집 기간(일)'
        type: number
        default: 7

env:
  PYTHONIOENCODING: utf-8

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 0: 만료 공고 정리 ──
      - name: Step 0 — 기한 만료 공고 정리 (Cleanup)
        id: cleanup
        run: |
          cd job_raw
          python scripts/cleanup_expired.py 2>&1

      # ── Step 1: 수집 ──
      - name: Step 1 — 채용공고 수집 (Harvester)
        id: harvest
        env:
          ALIO_API_KEY: ${{ secrets.ALIO_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FORCE_LLM_OVERRIDE: ${{ secrets.NVIDIA_API_KEY && '1' || '0' }}
        run: |
          cd job_raw
          DAYS="${{ github.event_name == 'schedule' && '7' || inputs.days || '7' }}"
          MOCK="${{ github.event_name == 'schedule' && '--no-mock' || (inputs.mock == 'false' && '--no-mock' || '--mock') }}"
          python scripts/main.py $MOCK --days $DAYS 2>&1

      # ── Step 2: Wiki 변환 ──
      - name: Step 2 — Wiki 변환 (Raw → Analysis + Index)
        id: wiki
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd job_raw
          python scripts/wiki_generator.py 2>&1

      # ── Step 3: 온톨로지 자동 병합 ──
      - name: Step 3 — 신규 키워드 온톨로지 자동 병합 (Merge Ontology)
        id: merge_ontology
        run: |
          cd job_raw
          python scripts/merge_ontology.py 2>&1

      # ── Step 4: Commit & Push ──
      - name: Step 4 — 변경사항 커밋 및 푸시
        run: |
          git config user.name "job-wiki-bot"
          git config user.email "bot@job-wiki.gh"
          git add -A
          git diff --staged --quiet || git commit -m "auto: 채용공고 수집 ($(date +'%Y-%m-%d'))"
          git push
