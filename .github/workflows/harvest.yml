name: 주간 채용공고 수집

on:
  schedule:
    # 매주 월요일 09:00 KST (일요일 24:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mock:
        description: '모의 데이터 사용'
        type: boolean
        default: false
      days:
        description: '수집 기간(일)'
        type: number
        default: 7
      count:
        description: '분석 제한 개수 (비워두면 전체)'
        type: number
        default: 0

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 0: 만료 공고 정리 (job_core) ──
      - name: Step 0 — 기한 만료 공고 정리 (Cleanup)
        id: cleanup
        run: |
          cd job_core\scripts
          python cleanup_expired.py 2>&1

      # ── Step 1: 수집 ──
      - name: Step 1 — 채용공고 수집 (Harvester)
        id: harvest
        env:
          ALIO_API_KEY: ${{ secrets.ALIO_API_KEY }}
          ALIO_ENDPOINT: ${{ secrets.ALIO_ENDPOINT || 'https://opendata.alio.go.kr/new/v1/recruit/list.do' }}
          ALIO_MAX_PAGES: "10"
          DETAIL_MAX_DETAIL_CALLS: "0"      # 0 = unlimited
        run: |
          cd job_raw
          DAYS="${{ github.event_name == 'schedule' && '7' || inputs.days || '7' }}"
          DAYS="${DAYS%.*}"  # float → int (GitHub number 입력 버그 대응)
          COUNT="${{ github.event_name == 'schedule' && '' || inputs.count || '' }}"
          COUNT="${COUNT%.*}"
          MOCK="${{ (github.event_name == 'schedule' || !inputs.mock) && '--no-mock' || '' }}"
          python scripts/main.py $MOCK --days $DAYS ${COUNT:+--count $COUNT} 2>&1

      # ── Step 2: Wiki 변환 (raw → facet wiki) ──
      - name: Step 2 — Wiki 변환 (Raw → Facets)
        id: wiki
        run: |
          cd job_core\scripts
          python wiki_generator.py 2>&1

      # ── Step 3: Commit & Push ──
      - name: Step 3 — 변경사항 커밋 및 푸시
        run: |
          git config user.name "job-wiki-bot"
          git config user.email "bot@job-wiki.gh"
          git add -A
          git diff --staged --quiet || git commit -m "auto: 채용공고 수집 ($(date +'%Y-%m-%d'))"
          git push
