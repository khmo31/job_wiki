name: 주간 채용공고 수집

on:
  schedule:
    # 매주 월요일 09:00 KST (일요일 24:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mock:
        description: '모의 데이터 사용'
        type: boolean
        default: false
      days:
        description: '수집 기간(일)'
        type: number
        default: 7

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 0: 만료 공고 정리 ──
      - name: Step 0 — 기한 만료 공고 정리 (Cleanup)
        id: cleanup
        run: |
          cd job_raw
          python scripts/cleanup_expired.py 2>&1

      # ── Step 1: 수집 ──
      - name: Step 1 — 채용공고 수집 (Harvester)
        id: harvest
        env:
          ALIO_API_KEY: ${{ secrets.ALIO_API_KEY }}
          ALIO_ENDPOINT: ${{ secrets.ALIO_ENDPOINT || 'https://opendata.alio.go.kr/new/v1/recruit/list.do' }}
          ALIO_MAX_PAGES: "10"
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          LLM_PROVIDER: opencode-go
          LLM_EXTRACT_MODEL: deepseek-v4-flash
          NCS_FILTER_MODE: off
          DETAIL_MAX_DETAIL_CALLS: "0"      # 0 = unlimited
          ANALYSIS_MIN_CHARS_TO_CALL_LLM: "0"  # 0 = LLM 호출 조건 없음 (모든 공고 추출)
        run: |
          cd job_raw
          DAYS="${{ github.event_name == 'schedule' && '7' || inputs.days || '7' }}"
          DAYS="${DAYS%.*}"  # float → int (GitHub number 입력 버그 대응)
          MOCK="${{ (github.event_name == 'schedule' || !inputs.mock) && '--no-mock' || '' }}"
          python scripts/main.py $MOCK --days $DAYS 2>&1

      # ── Step 2: Wiki 변환 ──
      - name: Step 2 — Wiki 변환 (Raw → Analysis + Index)
        id: wiki
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          LLM_EXTRACT_MODEL: deepseek-v4-flash
        run: |
          cd job_raw
          python scripts/wiki_generator.py 2>&1

      # ── Step 3: 온톨로지 자동 병합 ──
      - name: Step 3 — 신규 키워드 온톨로지 자동 병합 (Merge Ontology)
        id: merge_ontology
        run: |
          cd job_raw
          python scripts/merge_ontology.py 2>&1

      # ── Step 4: Commit & Push ──
      - name: Step 4 — 변경사항 커밋 및 푸시
        run: |
          git config user.name "job-wiki-bot"
          git config user.email "bot@job-wiki.gh"
          git add -A
          git diff --staged --quiet || git commit -m "auto: 채용공고 수집 ($(date +'%Y-%m-%d'))"
          git push
