entity_mapping_task:
  description: >
    입력 문장: {user_profile}
    1. 핵심 키워드를 찾고 OntologyCheckTool을 쉼표 구분 문자열로 호출한다.
    2. 반환된 [[표준키워드]]만 사용한다.
    3. 그룹형 키워드(/, 괄호, 그룹)은 검색용에서 제외한다.
    4. 결과는 JSON만 반환한다.
  expected_output: >
    {"validated_keywords": ["[[표준키워드]]"], "search_keywords": ["검색용 키워드"]}
  agent: career_entity_mapper

final_evaluation_task:
  description: >
    entity_mapping_task의 search_keywords를 먼저 사용하고, WikiReadOnlyTool로 색인 검색 후 정확한 파일명으로 다시 읽는다.
    상위 3개 파일만 확인하고, 최종적으로 5개 추천 기관 JSON을 작성한다.
  expected_output: >
    {"recommended_institutions": [{"institution": "기관명", "file": "파일명.md", "score": 85, "matched_keywords": ["키워드"]}]}
  agent: final_evaluator
