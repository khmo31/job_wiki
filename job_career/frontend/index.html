<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Discovery AI | 커리어 판단 에이전트</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans antialiased">

    <!-- Hero Section / Header -->
    <div class="max-w-5xl mx-auto px-6 pt-12 pb-8 text-center">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-sm font-medium mb-4">
            <i data-lucide="sparkles" class="w-4 h-4"></i> AI 기반 커리어 분석 서비스
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4 tracking-tight">
            당신의 전문성을 <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">최적의 기관</span>에 매칭하세요
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">
            당신의 경력과 역량을 분석하여 가장 적합한 공공기관과 직무를 추천해 드립니다.
        </p>
    </div>

    <main class="max-w-5xl mx-auto px-6 pb-20">
        <!-- Input Section -->
        <section class="glass rounded-3xl p-6 md:p-8 mb-10 border border-slate-700/50">
            <div class="flex items-center justify-between mb-4">
                <label for="profile" class="text-white font-semibold flex items-center gap-2">
                    <i data-lucide="user-round" class="w-5 h-5 text-indigo-400"></i> 커리어 프로필 입력
                </label>
                <button id="loadExample" class="text-xs text-slate-400 hover:text-indigo-400 transition-colors">
                    예시 불러오기
                </button>
            </div>
            
            <textarea id="profile" 
                class="w-full h-48 bg-slate-800/50 border border-slate-700 rounded-2xl p-5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all resize-none placeholder-slate-500"
                placeholder="어떤 일을 해오셨나요? 귀하의 상세한 경력, 보유 기술, 이직 희망 분야를 자유롭게 작성해 주세요. (예: 5년차 IT 운영 관리자...)"></textarea>

            <div class="mt-6 flex flex-col md:flex-row gap-4">
                <button id="analyzeBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-8 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20">
                    <i data-lucide="zap" class="w-5 h-5"></i> 분석 시작하기
                </button>
                <button id="resetBtn" class="px-6 py-4 rounded-xl border border-slate-700 font-medium hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i> 초기화
                </button>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500/20 border-t-indigo-500 mb-4"></div>
            <p class="text-lg text-slate-300 font-medium animate-pulse">커리어 프로필을 정밀 분석 중입니다...</p>
            <p class="text-slate-500 text-sm mt-2">최대 60초가 소요될 수 있습니다.</p>
        </div>

        <!-- Result Section -->
        <div id="resultContainer" class="hidden">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-px flex-1 bg-slate-800"></div>
                <h2 class="text-xl font-bold text-white whitespace-nowrap">분석 결과: 최적의 매칭 기관 <span id="matchCount">0</span>개</h2>
                <div class="h-px flex-1 bg-slate-800"></div>
            </div>
            
            <div id="resultGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Cards will be injected here -->
            </div>

            <div id="followUpContainer" class="hidden mt-8 rounded-3xl border border-emerald-500/20 bg-emerald-500/5 p-5 md:p-6">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between mb-5">
                    <div>
                        <p class="text-xs uppercase tracking-[0.35em] text-emerald-400 mb-2">보완 질문</p>
                        <h3 class="text-xl font-bold text-white">아직 확정되지 않은 분류를 선택해 주세요</h3>
                        <p id="followUpSummary" class="text-sm text-slate-400 mt-1">선택지를 고르면 추천을 다시 계산합니다.</p>
                    </div>
                    <button id="followUpSubmit" type="button" class="inline-flex items-center justify-center gap-2 rounded-xl bg-emerald-500 px-5 py-3 font-semibold text-white transition-colors hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-50">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> 선택 반영해 다시 분석
                    </button>
                </div>
                <div id="followUpGrid" class="grid grid-cols-1 gap-4 lg:grid-cols-2"></div>
            </div>
        </div>

        <!-- Archive Detail Modal -->
        <div id="archiveModal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md p-4 md:p-8">
            <div class="h-full max-w-5xl mx-auto flex items-center">
                <div class="w-full max-h-[90vh] bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden flex flex-col">
                    <div class="flex items-start justify-between gap-4 p-5 md:p-6 border-b border-slate-800">
                        <div>
                            <p class="text-xs uppercase tracking-[0.35em] text-indigo-400 mb-2">원본 공고(아카이브)</p>
                            <h3 id="archiveModalTitle" class="text-xl md:text-2xl font-bold text-white">상세보기</h3>
                            <p id="archiveModalMeta" class="text-sm text-slate-400 mt-1"></p>
                        </div>
                        <button id="archiveModalClose" type="button" class="shrink-0 rounded-xl border border-slate-700 px-3 py-2 text-slate-300 hover:text-white hover:bg-slate-800 transition-colors">
                            닫기
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-5 md:p-6">
                        <pre id="archiveModalBody" class="whitespace-pre-wrap break-words text-sm leading-7 text-slate-200 bg-slate-950/60 border border-slate-800 rounded-2xl p-5 min-h-[280px]"></pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden bg-red-500/10 border border-red-500/50 text-red-200 p-4 rounded-2xl flex items-center gap-3 mt-6">
            <i data-lucide="alert-circle" class="w-6 h-6 text-red-400"></i>
            <div>
                <p id="errorMessage" class="font-medium"></p>
                <button onclick="location.reload()" class="text-sm underline mt-1 opacity-80 hover:opacity-100">다시 시도</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Lucide 아이콘 렌더링
        lucide.createIcons();
    </script>
</body>
</html>
